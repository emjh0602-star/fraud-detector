<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 · 자금 이상거래 감지 시스템</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: #f5f4f0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.login-wrap {
  width: 100%;
  max-width: 400px;
}
.login-header {
  text-align: center;
  margin-bottom: 32px;
}
.login-header .logo-mark {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.2em;
  color: #9b9890;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.login-header h1 {
  font-size: 20px;
  font-weight: 500;
  color: #1a1917;
  line-height: 1.4;
}
.login-header p {
  font-size: 13px;
  color: #9b9890;
  margin-top: 6px;
}
.card {
  background: #fff;
  border: 1px solid #dddbd3;
  border-radius: 10px;
  padding: 32px;
}
.form-group {
  margin-bottom: 16px;
}
.form-group label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: #6b6860;
  margin-bottom: 6px;
  letter-spacing: 0.03em;
}
.form-group input {
  width: 100%;
  height: 42px;
  padding: 0 14px;
  border: 1px solid #c8c6bc;
  border-radius: 6px;
  font-size: 14px;
  color: #1a1917;
  font-family: 'Noto Sans KR', sans-serif;
  outline: none;
  transition: border-color 0.15s;
  background: #fff;
}
.form-group input:focus { border-color: #1a1917; }
.btn-login {
  width: 100%;
  height: 44px;
  background: #1a1917;
  color: #fff;
  border: none;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
  margin-top: 8px;
  transition: opacity 0.15s;
}
.btn-login:hover { opacity: 0.85; }
.btn-login:disabled { opacity: 0.5; cursor: not-allowed; }
.error-msg {
  background: #fff0ee;
  border: 1px solid #f5c6c0;
  border-radius: 6px;
  padding: 10px 14px;
  font-size: 13px;
  color: #c0392b;
  margin-bottom: 16px;
  display: none;
}
.footer-note {
  text-align: center;
  font-size: 11px;
  color: #9b9890;
  margin-top: 20px;
  font-family: 'JetBrains Mono', monospace;
}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-header">
    <div class="logo-mark">FDS v1.0</div>
    <h1>자금 이상거래<br>감지 시스템</h1>
    <p>지주사 재무팀 전용</p>
  </div>
  <div class="card">
    <div class="error-msg" id="error-msg"></div>
    <div class="form-group">
      <label>아이디</label>
      <input type="text" id="username" placeholder="아이디 입력" autocomplete="username" />
    </div>
    <div class="form-group">
      <label>비밀번호</label>
      <input type="password" id="password" placeholder="비밀번호 입력" autocomplete="current-password"
             onkeydown="if(event.key==='Enter') doLogin()" />
    </div>
    <button class="btn-login" id="login-btn" onclick="doLogin()">로그인</button>
  </div>
  <div class="footer-note">재무팀 내부용 · 계정 문의: 관리자</div>
</div>

<script>
async function doLogin() {
  const uid = document.getElementById('username').value.trim();
  const pw  = document.getElementById('password').value;
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('error-msg');

  if (!uid || !pw) { showErr('아이디와 비밀번호를 입력해주세요.'); return; }

  btn.disabled = true;
  btn.textContent = '로그인 중...';
  err.style.display = 'none';

  try {
    const res  = await fetch('/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: uid, password: pw })
    });
    const data = await res.json();
    if (data.ok) {
      window.location.href = '/';
    } else {
      showErr(data.error || '로그인에 실패했습니다.');
    }
  } catch(e) {
    showErr('서버에 연결할 수 없습니다.');
  } finally {
    btn.disabled = false;
    btn.textContent = '로그인';
  }
}

function showErr(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
}
</script>
</body>
</html>
